name: waychat
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  intl: ^0.18.0
  image_picker: ^0.8.7+4
  record: ^4.4.4
  audioplayers: ^5.2.0
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: assets/branding/adaptive_foreground.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
